name: Daily refresh

# Roterende refresh: elke nacht worden de N oudste tickers ververst.
# Met 621 tickers en limit=90 betekent dit dat alles binnen ~7 dagen vers is.
#
# Architectuur: per-ticker synchrone calls. GitHub Actions houdt zelf de loop
# aan, dus geen in-memory state op Fly. Dat maakt de pipeline restart-safe —
# een Fly-restart midden in een batch kost hooguit één mislukte ticker.
#
# Benodigde secrets in GitHub (Settings → Secrets and variables → Actions):
#   CRON_TOKEN — identiek aan fly secret CRON_TOKEN
#   APP_URL    — https://stockscreen-janco.fly.dev
#
# Handmatige run: Actions-tab → "Daily refresh" → "Run workflow"

on:
  schedule:
    - cron: "0 3 * * *"   # elke dag 03:00 UTC (≈ 04:00/05:00 Amsterdam)
  workflow_dispatch:
    inputs:
      limit:
        description: "Aantal tickers in deze batch"
        required: false
        default: "90"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # ruim: 500 tickers × ~15s = ~2u
    steps:
      - name: Fetch batch list
        id: batch
        env:
          APP_URL:    ${{ secrets.APP_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          LIMIT:      ${{ github.event.inputs.limit || '90' }}
        run: |
          set -euo pipefail
          RESP=$(curl -sS --max-time 30 \
            -H "X-Cron-Token: ${CRON_TOKEN}" \
            "${APP_URL}/api/cron/next-batch?limit=${LIMIT}")
          COUNT=$(echo "${RESP}" | jq -r '.count // 0')
          TOTAL=$(echo "${RESP}" | jq -r '.total // 0')
          OLDEST=$(echo "${RESP}" | jq -r '.oldest_date // "never"')
          echo "Batch: ${COUNT} tickers (oudste datum ${OLDEST}, totaal ${TOTAL})"
          echo "${RESP}" | jq -r '.tickers[]' > tickers.txt
          echo "count=${COUNT}" >> "${GITHUB_OUTPUT}"

      - name: Refresh each ticker sequentially
        env:
          APP_URL:    ${{ secrets.APP_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
          TOTAL:      ${{ steps.batch.outputs.count }}
        run: |
          set -uo pipefail   # geen -e: 1 mislukte ticker mag niet de workflow kicken
          OK=0
          FAIL=0
          INSUFFICIENT=0
          IDX=0
          INSUFFICIENT_LIST=""
          FAIL_LIST=""
          while IFS= read -r T; do
            [ -z "${T}" ] && continue
            IDX=$((IDX + 1))
            # Per ticker max 100s wachten; Fly gunicorn-timeout is 120s
            RESP=$(curl -sS --max-time 100 -X POST \
              -H "X-Cron-Token: ${CRON_TOKEN}" \
              "${APP_URL}/api/cron/refresh-one/${T}" 2>&1 || echo '{"ok":false,"error":"curl-failed"}')
            STATUS=$(echo "${RESP}" | jq -r '.ok // false' 2>/dev/null || echo "false")
            SIGNAL=$(echo "${RESP}" | jq -r '.signal // "?"'  2>/dev/null || echo "?")
            FV=$(echo     "${RESP}" | jq -r '.combined_fv // "?"' 2>/dev/null || echo "?")
            ELAPSED=$(echo "${RESP}" | jq -r '.elapsed_s // "?"' 2>/dev/null || echo "?")
            if [ "${STATUS}" = "true" ]; then
              OK=$((OK + 1))
              printf "[%3d/%s] ✓ %-12s  signal=%-10s  fv=%-10s  (%ss)\n" \
                "${IDX}" "${TOTAL}" "${T}" "${SIGNAL}" "${FV}" "${ELAPSED}"
              # Tel FV-plausibiliteitsgate / data-kwaliteit-gate hits
              if [ "${SIGNAL}" = "INSUFFICIENT DATA" ]; then
                INSUFFICIENT=$((INSUFFICIENT + 1))
                INSUFFICIENT_LIST="${INSUFFICIENT_LIST} ${T}"
              fi
            else
              FAIL=$((FAIL + 1))
              FAIL_LIST="${FAIL_LIST} ${T}"
              ERR=$(echo "${RESP}" | jq -r '.error // "unknown"' 2>/dev/null || echo "parse-error")
              printf "[%3d/%s] ✗ %-12s  (%s)\n" "${IDX}" "${TOTAL}" "${T}" "${ERR}"
            fi
          done < tickers.txt
          echo ""
          echo "=== Klaar ==="
          echo "Succes:           ${OK}"
          echo "Fouten:           ${FAIL}"
          echo "INSUFFICIENT DATA: ${INSUFFICIENT}"

          # GitHub step summary — toont in workflow-overzicht + email
          {
            echo "## Daily refresh — batch ${TOTAL}"
            echo ""
            echo "| Status | Aantal |"
            echo "|---|---|"
            echo "| ✓ Succes | ${OK} |"
            echo "| ✗ Fouten | ${FAIL} |"
            echo "| ⚠ INSUFFICIENT DATA | ${INSUFFICIENT} |"
            if [ -n "${FAIL_LIST}" ]; then
              echo ""
              echo "### Fouten"
              echo "\`${FAIL_LIST# }\`"
            fi
            if [ -n "${INSUFFICIENT_LIST}" ]; then
              echo ""
              echo "### INSUFFICIENT DATA (sanity-gate getriggerd)"
              echo "\`${INSUFFICIENT_LIST# }\`"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          # Workflow faalt bij >20% hard-fouten OF >30% INSUFFICIENT DATA —
          # eenzame yfinance-timeouts zijn normaal, maar een batch waarin
          # 1/3 van de tickers de FV-gate triggert duidt op een upstream-probleem.
          if [ "${TOTAL}" -gt 0 ] && [ "${FAIL}" -gt "$((TOTAL / 5))" ]; then
            echo "::error::>20% van tickers faalde (${FAIL}/${TOTAL}) — check Fly logs"
            exit 1
          fi
          if [ "${TOTAL}" -gt 0 ] && [ "${INSUFFICIENT}" -gt "$((TOTAL * 3 / 10))" ]; then
            echo "::error::>30% INSUFFICIENT DATA (${INSUFFICIENT}/${TOTAL}) — mogelijk schaal/FX/data-bug in pipeline"
            exit 1
          fi
